spring.main.allow-bean-definition-overriding=true
spring.profiles.active=jdbi

# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Database Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB}?user=${POSTGRES_USER}&password=${POSTGRES_PASSWORD}&currentSchema=dbo

# Database Migrations
spring.flyway.enabled=true
spring.flyway.schemas=dbo
spring.flyway.default-schema=dbo
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Swagger UI / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Redis
spring.data.redis.host=localhost

# Security
jwt.secret=${JWT_SECRET}
cors.allowed-origins=http://localhost:8000

# Business Logic
password.policy.min-length=8
password.policy.requires-uppercase=true
password.policy.requires-lowercase=true
password.policy.requires-digit=true
password.policy.requires-special-char=true
